<style>
  /* ── Bouton flottant ── */
  #boukidan-bubble {
    position: fixed;
    bottom: 28px;
    right: 28px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: linear-gradient(135deg, #1b5e20, #4caf50);
    color: white;
    font-size: 26px;
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(0,0,0,0.35);
    z-index: 99999;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s;
  }
  #boukidan-bubble:hover { transform: scale(1.1); }

  /* ── Boîte de chat ── */
  #boukidan-box {
    display: none;
    position: fixed;
    bottom: 100px;
    right: 28px;
    width: 330px;
    height: 450px;
    background: #ffffff;
    border-radius: 18px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    flex-direction: column;
    z-index: 99999;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, sans-serif;
  }

  /* ── En-tête ── */
  #boukidan-header {
    background: linear-gradient(135deg, #1b5e20, #4caf50);
    color: white;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #boukidan-header .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,0.25);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  #boukidan-header .info { flex: 1; }
  #boukidan-header .info .name { font-weight: bold; font-size: 14px; }
  #boukidan-header .info .status { font-size: 11px; opacity: 0.85; }
  #boukidan-close {
    background: none; border: none; color: white;
    font-size: 20px; cursor: pointer; padding: 0 4px;
  }

  /* ── Messages ── */
  #boukidan-messages {
    flex: 1;
    overflow-y: auto;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: #f9fbe7;
  }
  .bk-msg-bot, .bk-msg-user {
    max-width: 82%;
    padding: 9px 13px;
    border-radius: 14px;
    font-size: 13px;
    line-height: 1.5;
    white-space: pre-line;
  }
  .bk-msg-bot {
    background: #ffffff;
    align-self: flex-start;
    border: 1px solid #e0e0e0;
    border-bottom-left-radius: 4px;
  }
  .bk-msg-user {
    background: linear-gradient(135deg, #1b5e20, #388e3c);
    color: white;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }
  .bk-typing {
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 14px;
    border-bottom-left-radius: 4px;
    padding: 10px 14px;
    align-self: flex-start;
    font-size: 18px;
    letter-spacing: 3px;
  }

  /* ── Zone de saisie ── */
  #boukidan-input-zone {
    display: flex;
    align-items: center;
    border-top: 1px solid #e0e0e0;
    padding: 10px;
    background: #fff;
    gap: 8px;
  }
  #boukidan-input {
    flex: 1;
    border: 1px solid #c8e6c9;
    border-radius: 22px;
    padding: 9px 15px;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  #boukidan-input:focus { border-color: #4caf50; }
  #boukidan-send {
    background: linear-gradient(135deg, #1b5e20, #4caf50);
    color: white;
    border: none;
    border-radius: 50%;
    width: 38px;
    height: 38px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s;
  }
  #boukidan-send:hover { transform: scale(1.1); }
</style>

<!-- Bouton flottant -->
<button id="boukidan-bubble" onclick="boukidanToggle()" title="Chatbot Boukidan">🌿</button>

<!-- Fenêtre de chat -->
<div id="boukidan-box">
  <div id="boukidan-header">
    <div class="avatar">🏡</div>
    <div class="info">
      <div class="name">Assistant Boukidan</div>
      <div class="status">🟢 En ligne</div>
    </div>
    <button id="boukidan-close" onclick="boukidanToggle()">✕</button>
  </div>

  <div id="boukidan-messages">
    <div class="bk-msg-bot">👋 Bonjour et bienvenue sur le site du village de <strong>Boukidan</strong> !<br><br>Je peux vous renseigner sur le tourisme, l'histoire, les services et bien plus. Comment puis-je vous aider ?</div>
  </div>

  <div id="boukidan-input-zone">
    <input id="boukidan-input" type="text" placeholder="Posez votre question..."
      onkeydown="if(event.key==='Enter') boukidanEnvoyer()"/>
    <button id="boukidan-send" onclick="boukidanEnvoyer()">➤</button>
  </div>
</div>

<script>
  // ⚠️ Remplacez cette URL par celle fournie par ngrok
  const BOUKIDAN_API = "https://shortcut-overvalue-unfeeling.ngrok-free.dev ";

  function boukidanToggle() {
    const box = document.getElementById("boukidan-box");
    const isVisible = box.style.display === "flex";
    box.style.display = isVisible ? "none" : "flex";
  }

  async function boukidanEnvoyer() {
    const input = document.getElementById("boukidan-input");
    const messages = document.getElementById("boukidan-messages");
    const texte = input.value.trim();
    if (!texte) return;

    // Message utilisateur
    messages.innerHTML += `<div class="bk-msg-user">${texte}</div>`;
    input.value = "";
    messages.scrollTop = messages.scrollHeight;

    // Animation de frappe
    const typing = document.createElement("div");
    typing.className = "bk-typing";
    typing.id = "bk-typing";
    typing.textContent = "• • •";
    messages.appendChild(typing);
    messages.scrollTop = messages.scrollHeight;

    try {
      const res = await fetch(BOUKIDAN_API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: texte })
      });
      const data = await res.json();
      document.getElementById("bk-typing")?.remove();
      messages.innerHTML += `<div class="bk-msg-bot">${data.reponse}</div>`;
    } catch (e) {
      document.getElementById("bk-typing")?.remove();
      messages.innerHTML += `<div class="bk-msg-bot" style="color:#c62828;">❌ Impossible de joindre le serveur. Vérifiez que le chatbot est bien démarré.</div>`;
    }
    messages.scrollTop = messages.scrollHeight;
  }
</script>
